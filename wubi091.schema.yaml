# Rime schema settings
# encoding: utf-8
# 基于点儿词库2026春 091五笔方案

schema:
  schema_id: wubi091
  name: "091五笔"
  version: "2026.spring"
  author:
    - 编码方案始创者 行走的风景
    - 词库作者 晓览（点儿词库）
  description: |
    基于点儿词库2026春
    敲 ` 键进入拼音反查
    包含 z 词条（特殊符号/emoji）
  dependencies:
    - pinyin_simp

switches:
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: ascii_punct
    states: [ ，。, ，． ]
  - name: extended_charset
    states: [ 通用, 扩展 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - reverse_lookup_translator
    - table_translator
    - history_translator@history

# Z键重复上屏（单按z触发，za/zb等多键组合走词库）
history:
  input: z
  size: 3
  initial_quality: 10000

speller:
  delimiter: " ;'"
  max_code_length: 4
  auto_select: true
  auto_select_unique_candidate: true
  alphabet: 'abcdefghijklmnopqrstuvwxyz'
  initials: abcdefghijklmnopqrstuvwxyz

translator:
  dictionary: wubi091.extended
  enable_charset_filter: true
  enable_sentence: false
  enable_encoder: false
  encode_commit_history: true
  max_phrase_length: 4
  disable_user_dict_for_patterns:
    - "^z.*$"
  enable_user_dict: false

reverse_lookup:
  dictionary: pinyin_simp
  prefix: "`"
  suffix: "'"
  tips: 〔拼音〕
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1u/

punctuator:
  import_preset: default

key_binder:
  import_preset: default

recognizer:
  import_preset: default
  patterns:
    reverse_lookup: "^`[a-z]*'?$"
